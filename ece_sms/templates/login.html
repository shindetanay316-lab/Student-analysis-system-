<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ECE Student Management System</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            font-family: "Times New Roman", Times, serif;
            background: linear-gradient(135deg, #0f1f3d, #1a2b4a 55%, #c9a227);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #1a1a1a;
            padding: 24px;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 18px;
            box-shadow: 0 18px 45px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            border: 1px solid rgba(201, 162, 39, 0.35);
        }

        .login-header {
            background: #1A2B4A;
            color: #fff;
            padding: 24px 28px;
            border-bottom: 4px solid #C9A227;
            text-align: center;
        }

        .login-header h1 {
            font-size: 22px;
            margin-bottom: 6px;
        }

        .login-header p {
            font-size: 14px;
            color: #dbe4f0;
        }

        .login-body {
            padding: 28px;
        }

        .flash {
            padding: 10px 12px;
            border-radius: 8px;
            margin-bottom: 14px;
            font-size: 14px;
        }

        .flash.error {
            background: #fdecea;
            color: #9f1c12;
            border: 1px solid #f5c6cb;
        }

        .flash.success {
            background: #eaf7ee;
            color: #176b32;
            border: 1px solid #b7e3c3;
        }

        label {
            display: block;
            font-weight: bold;
            margin: 14px 0 6px;
            color: #1A2B4A;
        }

        input {
            width: 100%;
            padding: 12px 13px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 15px;
            outline: none;
        }

        input:focus {
            border-color: #C9A227;
            box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.18);
        }

        button {
            width: 100%;
            margin-top: 22px;
            padding: 12px;
            border: 0;
            border-radius: 10px;
            background: #C9A227;
            color: #101828;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #b79220;
        }

        .hint {
            margin-top: 16px;
            font-size: 13px;
            color: #64748b;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <div class="login-header">
            <h1>ECE Student Management System</h1>
            <p>Admin / Teacher Login</p>
        </div>
        <div class="login-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="flash {{ category }}">{{ message|safe }}</div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required autofocus>

                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>

                <button type="submit">Login</button>
            </form>

            <div class="hint">Default after seed: admin / admin123</div>
        </div>
    </div>
</body>

</html>
